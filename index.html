<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Logic Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-container">
    <h1>Double Logic Studio</h1>
    <div id="signup-login">
      <h2>Sign Up</h2>
      <input type="text" id="signup-username" placeholder="Username">
      <input type="password" id="signup-password" placeholder="Password">
      <button onclick="signUp()">Sign Up</button>

      <h2>Login</h2>
      <input type="text" id="login-username" placeholder="Username">
      <input type="password" id="login-password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>

  <div id="app-container" style="display:none;">
    <nav>
      <button onclick="showPage('portfolio')">Portfolio</button>
      <button onclick="showPage('hiring')">Hiring</button>
      <button id="dev-dashboard-btn" onclick="showPage('dashboard')" style="display:none;">Dev Dashboard</button>
      <button onclick="logout()">Logout</button>
    </nav>

    <div id="pages">
      <!-- Portfolio Page -->
      <div id="portfolio-page" class="page">
        <h2>Portfolio</h2>
        <ul id="portfolio-list"></ul>
        <div id="add-project-div" style="display:none;">
          <input type="text" id="new-project-title" placeholder="Project Title">
          <input type="text" id="new-project-desc" placeholder="Description">
          <select id="new-project-status">
            <option>Active</option>
            <option>In Development</option>
            <option>Completed</option>
          </select>
          <button onclick="addProject()">Add Project</button>
        </div>
      </div>

      <!-- Hiring Page -->
      <div id="hiring-page" class="page" style="display:none;">
        <h2>Hiring Form</h2>
        <input type="text" id="hire-name" placeholder="Name">
        <input type="number" id="hire-age" placeholder="Age">
        <input type="text" id="hire-role" placeholder="Role">
        <textarea id="hire-exp" placeholder="Experience"></textarea>
        <textarea id="hire-reason" placeholder="Why hire you?"></textarea>
        <button onclick="submitApplication()">Submit</button>

        <h3>Applications (Dev Only)</h3>
        <ul id="applications-list"></ul>
      </div>

      <!-- Developer Dashboard -->
      <div id="dashboard-page" class="page" style="display:none;">
        <h2>Developer Dashboard</h2>
        <h3>Edit Portfolio / Add Tasks</h3>
        <ul id="tasks-list"></ul>
        <input type="text" id="new-task" placeholder="New Task">
        <button onclick="addTask()">Add Task</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
